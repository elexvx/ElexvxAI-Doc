capabilities:
  - title:
      zh: 核心研究
      en: Core Research
    description:
      zh: 深度学习算法与基础模型，拓展生成式任务的 AI 能力边界。
      en: Deep learning algorithms and foundation models, expanding generative AI capabilities.
    icon: PenTool
    hoverGradient: from-sky-300 via-blue-200 to-blue-500
    hoverGlow: from-white/45 to-transparent
  - title:
      zh: 开源贡献
      en: Open-source Contribution
    description:
      zh: 向全球研究社区贡献最前沿的代码、预训练模型和大规模数据集。
      en: Contributing cutting-edge code, pretrained models, and large-scale datasets to the research community.
    icon: Gift
    hoverGradient: from-violet-300 via-indigo-200 to-blue-300
    hoverGlow: from-lime-300/50 to-transparent
  - title:
      zh: 工业应用
      en: Industrial Applications
    description:
      zh: 部署可扩展的 AI 解决方案，优化制造、物流和供应链。
      en: Deploy scalable AI solutions to optimize manufacturing, logistics, and supply chains.
    icon: BookOpen
    hoverGradient: from-emerald-300/80 via-cyan-300/75 to-blue-400/90
    hoverGlow: from-emerald-200/40 to-transparent
