about:
  title: About Us
  content: |
    **ElexvxAI Innovation Industry R&D Center**, with the English name **ElexvxAI Lab**, was officially established by **Hongxiang Shangdao (Nanjing) Technology Development Co., Ltd.** on **March 6, 2026**.

    The center focuses on AI technology innovation, industry-oriented application R&D, digital transformation enablement, and innovation commercialization. It is committed to building a comprehensive innovation platform integrating **technology research, product development, system integration, scenario implementation, and collaborative innovation**.

whatWeDo:
  title: What We Do
  items:
    - title: AI Technology Research
      description: We conduct research and engineering practice in AI model capabilities, data analytics, intelligent decision-making, workflow automation, and applied algorithms.
    - title: Industry Scenario Applications
      description: We develop practical and scalable intelligent solutions for enterprise services, industrial upgrading, smart operations, and digital transformation scenarios.
    - title: Intelligent Products and Platforms
      description: We promote the development and incubation of AI-related products, tools, platforms, and digital systems, enhancing productization and engineering implementation.
    - title: Technology Integration and Innovation Transformation
      description: We drive the deep integration of AI with software systems, industrial scenarios, data platforms, intelligent monitoring, and related business systems, accelerating innovation transformation and real-world deployment.

