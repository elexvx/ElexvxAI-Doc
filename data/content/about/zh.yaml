collaboration:
  title: 合作共建
  content: 我们欢迎开发者、研究者、合作伙伴及产业创新实践者共同参与交流与合作，围绕人工智能技术研发、产品创新、场景应用与产业转化开展协同共建。

lookingAhead:
  title: 未来展望
  content: ElexvxAI创新产业研发中心将持续面向未来技术趋势与产业发展需求，深化人工智能研究与应用探索，推进更多高质量成果形成与落地，为产业升级与数字化发展贡献力量。

